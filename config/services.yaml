              category: 'label.category_media'
              media_types: 'video/*'

    ui.block.video_iframe:
        class: stdClass
        tags:
            - name: ui.block
              kind: video_iframe
              label: "label.block_video_iframe"
              form: c975L\UiBundle\Form\Block\VideoIframeType
              template: '@c975LUi/blocks/VideoIframe.html.twig'
