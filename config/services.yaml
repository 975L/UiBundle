services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\UiBundle\:
        resource: '../src/'
        exclude: '../src/{DependencyInjection,Entity}'

    c975L\UiBundle\Service\StylesheetProvider:
        tags:
            - { name: 'ui.stylesheet', priority: 100 }

    c975L\UiBundle\Service\ScriptProvider:
        tags:
            - { name: 'ui.script', priority: 100 }
            - { name: 'ui.admin_script', priority: 100 }

    # Ui Blocks
    ui.block.article:
        class: stdClass
        tags:
            - name: ui.block
              kind: article
              label: "label.block_article"
              form: c975L\UiBundle\Form\Block\ArticleType
              template: '@c975LUi/blocks/Article.html.twig'
              category: 'label.category_elements'
              media_types: 'image/*'

    ui.block.alert:
        class: stdClass
        tags:
            - name: ui.block
              kind: alert
              label: "label.block_alert"
              form: c975L\UiBundle\Form\Block\AlertType
              template: '@c975LUi/blocks/Alert.html.twig'
              category: 'label.category_elements'

    ui.block.audio:
        class: stdClass
        tags:
            - name: ui.block
              kind: audio
              label: "label.block_audio"
              form: c975L\UiBundle\Form\Block\AudioType
              template: '@c975LUi/blocks/Audio.html.twig'
              category: 'label.category_media'
              media_types: 'audio/*'

    ui.block.button:
        class: stdClass
        tags:
            - name: ui.block
              kind: button
              label: "label.block_button"
              form: c975L\UiBundle\Form\Block\ButtonType
              template: '@c975LUi/blocks/Button.html.twig'
              category: 'label.category_elements'

    ui.block.card:
        class: stdClass
        tags:
            - name: ui.block
              kind: card
              label: "label.block_card"
              form: c975L\UiBundle\Form\Block\CardType
              template: '@c975LUi/blocks/Card.html.twig'
              category: 'label.category_elements'

    ui.block.image:
        class: stdClass
        tags:
            - name: ui.block
              kind: image
              label: "label.block_image"
              form: c975L\UiBundle\Form\Block\ImageType
              template: '@c975LUi/blocks/Image.html.twig'
              category: 'label.category_media'
              media_types: 'image/*'

    ui.block.progress_bar:
        class: stdClass
        tags:
            - name: ui.block
              kind: progress_bar
              label: "label.block_progress_bar"
              form: c975L\UiBundle\Form\Block\ProgressBarType
              template: '@c975LUi/blocks/ProgressBar.html.twig'
              category: 'label.category_elements'

    ui.block.rich_snippet:
        class: stdClass
        tags:
            - name: ui.block
              kind: rich_snippet
              label: "label.block_rich_snippet"
              form: c975L\UiBundle\Form\Block\RichSnippetType
              template: '@c975LUi/blocks/RichSnippet.html.twig'
              category: 'label.category_seo'

    ui.block.slider:
        class: stdClass
        tags:
            - name: ui.block
              kind: slider
              label: "label.block_slider"
              form: c975L\UiBundle\Form\Block\SliderType
              template: '@c975LUi/blocks/Slider.html.twig'
              category: 'label.category_media'
              media_types: 'image/*'

    ui.block.text_readmore:
        class: stdClass
        tags:
            - name: ui.block
              kind: text_readmore
              label: "label.block_text_readmore"
              form: c975L\UiBundle\Form\Block\ReadmoreType
              template: '@c975LUi/blocks/TextReadmore.html.twig'
              category: 'label.category_text'

    ui.block.text_section:
        class: stdClass
        tags:
            - name: ui.block
